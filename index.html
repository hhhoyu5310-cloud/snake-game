<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#07130f" />
    <title>霓虹贪吃蛇</title>
    <link rel="stylesheet" href="style.css?v=arena-1" />
  </head>
  <body>
    <main class="game-shell">
      <header class="game-header">
        <div>
          <p class="eyebrow">NEON ARCADE</p>
          <h1>贪吃蛇</h1>
        </div>
        <button id="soundButton" class="icon-button" type="button" aria-label="切换音效">
          <span id="soundIcon">♪</span>
        </button>
      </header>

      <section class="stats" aria-label="游戏数据">
        <div class="stat-card">
          <span>当前得分</span>
          <strong id="score">0</strong>
        </div>
        <div class="stat-card">
          <span>最高纪录</span>
          <strong id="highScore">0</strong>
        </div>
        <div class="stat-card">
          <span>当前长度</span>
          <strong id="length">238</strong>
        </div>
      </section>

      <section class="board-wrap">
        <canvas id="gameCanvas" width="700" height="700" aria-label="自由移动贪吃蛇游戏区域"></canvas>
        <div id="overlay" class="overlay">
          <p id="overlayKicker">准备好了吗？</p>
          <h2 id="overlayTitle">开始游戏</h2>
          <p id="overlayText">按住屏幕滑动，蛇头会平滑跟随你的手指</p>
          <button id="startButton" class="primary-button" type="button">开始</button>
        </div>
      </section>

      <p class="swipe-hint"><span>◎</span> 按住游戏区域移动手指，自由控制蛇头方向</p>

      <div class="actions">
        <button id="pauseButton" class="secondary-button" type="button" disabled>
          <span>Ⅱ</span> 暂停
        </button>
        <button id="restartButton" class="secondary-button" type="button">
          <span>↻</span> 重开
        </button>
      </div>

      <footer>
        击败其他蛇会掉落大量能量 <span class="fruit-dot"></span> 吃掉它们继续成长
      </footer>
    </main>

    <script src="script.js?v=arena-1"></script>
  </body>
</html>
